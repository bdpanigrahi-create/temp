apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: temp
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  info:
    title: Cloud IDS Terraform Module
    source:
      repo: https://github.com/bdpanigrahi-create/temp.git
      sourceType: git
    version: 0.4.0
    actuationTool:
      flavor: Terraform
      version: ">= 1.3"
    description: {}
    icon: assets/icon.png
  content:
    examples:
      - name: cloud_ids_example
        location: examples/cloud_ids_example
  interfaces:
    variables:
      - name: project_id
        description: Project ID to deploy resources
        varType: string
        required: true
      - name: vpc_network_name
        description: VPC network name for IDS
        varType: string
        required: true
      - name: network_region
        description: Network region for IDS
        varType: string
        required: true
      - name: network_zone
        description: Network zone for IDS
        varType: string
        required: true
      - name: instance_list
        description: Instance list to monitor with Cloud IDS
        varType: list(string)
      - name: subnet_list
        description: Subnet list to monitor with Cloud IDS
        varType: list(string)
      - name: tag_list
        description: Tag list to monitor with Cloud IDS
        varType: list(string)
      - name: threat_exceptions
        description: "Threat_exceptions list to excluded from generating alerts. Limit: 99 IDs."
        varType: list(string)
      - name: ids_private_ip_range_name
        description: Cloud IDS private IP address range name
        varType: string
        defaultValue: ids-private-address
      - name: ids_private_ip_address
        description: Cloud IDS private IP address
        varType: string
      - name: ids_private_ip_prefix_length
        description: Cloud IDS private IP address prefix length
        varType: string
        defaultValue: 24
      - name: ids_private_ip_description
        description: Cloud IDS private IP address description
        varType: string
        defaultValue: Cloud IDS reserved IP Range
      - name: ids_name
        description: Cloud IDS instance name
        varType: string
        defaultValue: cloud-ids
      - name: severity
        description: The minimum alert severity level that is reported by the endpoint
        varType: string
        defaultValue: INFORMATIONAL
      - name: packet_mirroring_policy_name
        description: Packet mirroring policy name
        varType: string
        defaultValue: cloud-ids-packet-mirroring
      - name: packet_mirroring_policy_description
        description: Packet mirroring policy description
        varType: string
        defaultValue: Packet mirroring policy for Cloud IDS
      - name: ip_protocols_filter
        description: IP Protocols filter for packet mirroing policy. Can include 'tcp', 'udp', 'icmp', and 'esp'
        varType: list(string)
        defaultValue: []
      - name: cidr_ranges_filter
        description: IP CIDR ranges that apply as a filter on the source (ingress) or destination (egress) IP in the IP header. Only IPv4 is supported.
        varType: list(string)
        defaultValue: []
      - name: direction_filter
        description: Direction of traffic to mirror. Possible values are INGRESS, EGRESS, and BOTH.
        varType: string
        defaultValue: BOTH
      - name: create_service_networking_connection
        description: Whether to create service networking connection and IP range.
        varType: bool
        defaultValue: true
    outputs:
      - name: ids_endpoint_id
        description: IDS Endpoint id
      - name: ids_endpoint_severity
        description: IDS Endpoint severity
  requirements:
    roles:
      - level: Project
        roles:
          - roles/compute.admin
          - roles/iam.serviceAccountAdmin
          - roles/iam.serviceAccountUser
          - roles/ids.admin
          - roles/logging.viewer
          - roles/servicenetworking.networksAdmin
    services:
      - cloudresourcemanager.googleapis.com
      - iam.googleapis.com
      - ids.googleapis.com
      - storage-api.googleapis.com
      - servicenetworking.googleapis.com
      - serviceusage.googleapis.com
    providerVersions:
      - source: hashicorp/google
        version: ">= 3.53, < 8"
